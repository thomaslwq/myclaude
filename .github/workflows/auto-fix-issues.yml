# =============================================================================
# Auto-Fix Issues — Autonomous Issue Resolution Agent
# =============================================================================
# This workflow runs every hour, fetches all open issues from this repository,
# and uses an LLM-powered agent to autonomously resolve them.
#
# Design (inspired by mini-swe-agent):
#   An agent loop where the LLM has tool-use capabilities (read file, edit
#   file, run commands) to explore and fix the codebase autonomously.
#
# If a fix is produced:
#   1. The changes are committed and pushed to the default branch.
#   2. The package version is bumped (patch), a git tag is created.
#   3. The package is published to npm.
#
# Required repository secrets:
#   ┌─────────────────────────┬──────────────────────────────────────────────┐
#   │ Secret                  │ 说明                                         │
#   ├─────────────────────────┼──────────────────────────────────────────────┤
#   │ LLM_API_KEY             │ 模型 API key                                 │
#   │ LLM_MODEL_NAME          │ 模型名，如 "openai/glm-4.5" 或 "gpt-4o"     │
#   │ LLM_API_BASE            │ API 地址（可选）                             │
#   │ NPM_TOKEN               │ npm 发布 token                               │
#   │ GH_TOKEN                │ GitHub token（可选，默认用 GITHUB_TOKEN）     │
#   └─────────────────────────┴──────────────────────────────────────────────┘
# =============================================================================

name: Auto-Fix Issues

on:
  schedule:
    # Every hour at minute 0
    - cron: '0 * * * *'
  workflow_dispatch:
    inputs:
      max_issues:
        description: 'Maximum number of issues to process'
        required: false
        default: '3'
      dry_run:
        description: 'Dry run (do not commit/push/publish)'
        required: false
        type: boolean
        default: false
      model:
        description: 'Override LLM model name'
        required: false
        default: ''

concurrency:
  group: auto-fix-${{ github.ref }}
  cancel-in-progress: false

jobs:
  auto-fix:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org/'
          scope: '@funnycode'

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.5'

      - name: Install dependencies
        run: |
          # Override Tencent mirror (missing packages) with official registry
          bun install --frozen-lockfile --registry=https://registry.npmjs.org 2>/dev/null \
            || bun install --registry=https://registry.npmjs.org

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Run auto-fix agent
        id: auto-fix
        env:
          # LLM configuration
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_MODEL_NAME: ${{ inputs.model || secrets.LLM_MODEL_NAME || 'openai/glm-4.5' }}
          LLM_API_BASE: ${{ secrets.LLM_API_BASE || '' }}

          # GitHub configuration
          GH_TOKEN: ${{ secrets.GH_TOKEN || secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}

          # Workflow configuration
          MAX_ISSUES: ${{ github.event.inputs.max_issues || '3' }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
          COST_LIMIT: '3.0'

          # npm configuration
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          node .github/scripts/auto-fix.mjs

      - name: Upload agent trajectory logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: auto-fix-agent-logs
          path: |
            /tmp/auto-fix-*.log
          retention-days: 7
          if-no-files-found: ignore